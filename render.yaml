# Render blueprint — see https://render.com/docs/blueprint-spec
#
# This file MUST live at the repository root for Render's Blueprint flow
# to detect it. The service itself lives in the webapp/ subfolder, which
# is selected via `rootDir` below.

services:
  - type: web
    name: express-practice
    runtime: node
    plan: free                # bump to "starter" if you outgrow it
    rootDir: webapp           # the deployable app lives here
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NPM_CONFIG_PRODUCTION
        value: "false"        # keep client devDeps available across rebuilds

  # Separate instance: the SQL/MySQL variant. Runs an in-memory MySQL via
  # mysql-memory-server (real MySQL binary). `prefetch:mysql` warms the
  # binary cache during build so the first cold start is cheaper.
  - type: web
    name: sql-practice
    runtime: docker
    plan: free
    rootDir: mysql-webapp
    autoDeploy: true
    envVars:
      - key: MYSQL_VERSION
        value: "8.4.x"
